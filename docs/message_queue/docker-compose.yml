services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  worker:
    build: .
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    command: celery -A example worker --loglevel=info

  rq-worker:
    build: .
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    command: rq worker --url redis://redis:6379/0

  app:
    build: .
    environment:
      - REDIS_URL=redis://redis:6379/0
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - redis
      - rabbitmq
    command: tail -f /dev/null
