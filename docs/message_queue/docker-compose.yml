services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  worker:
    build: .
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    command: celery -A example worker --loglevel=info

  rq-worker:
    build: .
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    command: rq worker --url redis://redis:6379/0

  app:
    build: .
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    command: tail -f /dev/null
